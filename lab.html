<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NIROG Diagnostics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lab.css">
    <link rel="stylesheet" href="css/fragment.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animation.css">

</head>

<body>

<div id="topbar"></div>

<div id="header"></div>

<main>

    <section class="lab-banner">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-lg-3 text-center">

                    <img id="labLogo" class="lab-logo" src="" alt="Lab Logo">

                </div>

                <div class="col-lg-6">

                    <h1 id="labName"></h1>

                    <p class="rating">

                        ⭐⭐⭐⭐⭐ 4.9 Rating

                    </p>

                    <div class="lab-features">

                        <span><i class="fa-solid fa-house-medical"></i> Home Collection</span>

                        <span><i class="fa-solid fa-circle-check"></i> Online Reports</span>

                        <span><i class="fa-solid fa-shield-heart"></i> Trusted Partner</span>

                    </div>

                </div>

                <div class="col-lg-3 text-center">

                    <div class="discount-box">

                        <h3 id="discount"></h3>

                        <p>Special Discount</p>

                    </div>

                </div>

            </div>

        </div>

    </section>



    <section class="test-section">

        <div class="container">

            <div class="row">

                <div class="col-lg-8">

                    <div class="category-tabs">

                        <button class="category-btn active" data-category="blood">
                            Blood
                        </button>

                        <button class="category-btn" data-category="urine">
                            Urine
                        </button>

                        <button class="category-btn" data-category="thyroid">
                            Thyroid
                        </button>

                        <button class="category-btn" data-category="packages">
                            Packages
                        </button>

                    </div>



                    <table class="table table-bordered align-middle mt-4">

                        <thead>

                        <tr>

                            <th>Test Name</th>

                            <th>Price</th>

                            <th>Add</th>

                        </tr>

                        </thead>

                        <tbody id="testList">

                        </tbody>

                    </table>

                </div>



                <div class="col-lg-4">

                    <div class="booking-card">

                        <h3>Your Booking</h3>

                        <p>

                            Selected Tests

                        </p>

                        <h2 id="totalPrice">

                            ₹0

                        </h2>

                        <button class="book-btn" id="bookNowBtn">

                            Book Now

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <a href="https://wa.me/918908079448"

       class="whatsapp-float"

       target="_blank">

        <i class="fa-brands fa-whatsapp"></i>

    </a>

</main>

<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@srexi/purecounterjs/dist/purecounter_vanilla.js"></script>
<script src="js/include.js"></script>
<script src="js/lab.js"></script>
<script src="js/app.js"></script>
<script>

    const swiper = new Swiper(".testimonialSwiper",{

    loop:true,

    spaceBetween:30,

    speed:900,

    grabCursor:true,

    autoplay:{

    delay:2500,

    disableOnInteraction:false,

    pauseOnMouseEnter:true

    },

    pagination:{

    el:".swiper-pagination",

    clickable:true

    },

    breakpoints:{

    0:{

    slidesPerView:1

    },

    768:{

    slidesPerView:2

    },

    1200:{

    slidesPerView:3

    }

    }

    });

</script>
</body>

</html>
