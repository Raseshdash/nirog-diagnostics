<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Tests - NIROG Diagnostics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/fragment.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animation.css">
</head>

<body>

<div id="topbar"></div>
<div id="header"></div>

<main>

    <section class="search-banner">
        <div class="container">
            <h1>Search Tests &amp; Packages</h1>
            <p>Search once — compare prices across all our partner labs instantly.</p>

            <div class="search-autocomplete-wrapper">

                <form id="searchForm" class="search-form">
                    <input
                            type="text"
                            id="searchInput"
                            placeholder="Try: CBC, Lipid Profile, Kidney, Thyroid, X-Ray..."
                            autocomplete="off">

                    <button type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>

                <div id="searchSuggestions" class="search-suggestions"></div>

            </div>
        </div>
    </section>

    <section class="search-results-section">
        <div class="container">

            <div class="row">

                <div class="col-lg-8">

                    <div id="searchStatus" class="search-status"></div>

                    <div id="labResultsBox"></div>
                    <div id="radiologyResultsBox"></div>

                    <!-- Shown when the query matches nothing at all -->
                    <div id="noResults" class="no-results-box" style="display:none;">
                        <i class="fa-solid fa-magnifying-glass-minus"></i>
                        <h3>No matching test found for "<span id="noResultsQuery"></span>"</h3>
                        <p>
                            We couldn't find this test in our current listings.
                            Our team can confirm availability and pricing directly on WhatsApp.
                        </p>
                        <a id="whatsappFallback" href="#" target="_blank" class="whatsapp-fallback-btn">
                            <i class="fa-brands fa-whatsapp"></i>
                            Ask on WhatsApp
                        </a>
                    </div>

                </div>

                <div class="col-lg-4">
                    <div class="booking-card">
                        <h3>Your Booking</h3>
                        <p id="lockNote"></p>
                        <p>Selected Tests</p>
                        <h2 id="totalPrice">₹0</h2>
                        <button class="book-btn" id="bookNowBtn">
                            <i class="fa-brands fa-whatsapp"></i>
                            Continue on WhatsApp
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </section>

    <a href="tel:+918908079448" class="call-float">
        <i class="fa-solid fa-phone"></i>
    </a>
    <a href="https://wa.me/918908079448" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/include.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
